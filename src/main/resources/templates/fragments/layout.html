<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Step By Step'">Step By Step</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/blog.css}">
    <link rel="stylesheet" th:href="@{/css/blog-post.css}">
    <link rel="stylesheet" th:href="@{/css/galeria.css}">
    <link rel="stylesheet" th:href="@{/css/livros.css}">
    <link rel="stylesheet" th:href="@{/css/contato.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">

</head>
<body>
    <div class="site-shell">
        <header class="site-header" id="topo">
            <div class="header-container">
                <a class="brand" th:href="@{/}" href="/" aria-label="Ir para o topo">
                    <img th:src="@{/img/logo-transparente.png}" src="/img/logo-transparente.png" alt="Step By Step">
                </a>

                <button class="menu-toggle" type="button" aria-label="Abrir menu" aria-expanded="false" data-menu-toggle>
                    <span></span>
                    <span></span>
                    <span></span>
                </button>

                <nav class="site-nav" data-menu>
                    <a th:href="@{/}" href="/">Home</a>
                    <a th:href="@{/escola}" href="/escola">A Escola</a>
                    <a th:href="@{/blog}" href="/blog">Blog da Teacher</a>
                    <a th:href="@{/galeria}" href="/galeria">Galeria</a>
                    <a th:href="@{/livros}" href="/livros">Livros</a>
                    <a th:href="@{/contato}" href="/contato">Contato</a>
                </nav>

                <div class="header-actions">
                    <a class="cta-aluno" sec:authorize="isAnonymous()" th:href="@{/login}" href="/login">
                        <span class="cta-aluno-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" focusable="false">
                                <path d="M12 12.5a4.25 4.25 0 1 0 0-8.5 4.25 4.25 0 0 0 0 8.5Zm0 2.25c-4.1 0-7.5 2.68-8.34 6.25a.75.75 0 0 0 .73.92h15.22a.75.75 0 0 0 .73-.92c-.84-3.57-4.24-6.25-8.34-6.25Z" fill="currentColor"/>
                            </svg>
                        </span>
                        <span>Área do Aluno</span>
                    </a>

                    <a class="cta-aluno" sec:authorize="hasRole('ADMIN')" th:href="@{/admin/dashboard}" href="/admin/dashboard">
                        <span class="cta-aluno-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" focusable="false">
                                <path d="M10 3h4a1 1 0 0 1 1 1v1.2c.52.2 1 .47 1.44.8l1.05-.6a1 1 0 0 1 1.37.37l2 3.46a1 1 0 0 1-.37 1.37l-1.05.6c.04.28.06.56.06.84s-.02.56-.06.84l1.05.6a1 1 0 0 1 .37 1.37l-2 3.46a1 1 0 0 1-1.37.37l-1.05-.6c-.44.33-.92.6-1.44.8V20a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1v-1.2a6.9 6.9 0 0 1-1.44-.8l-1.05.6a1 1 0 0 1-1.37-.37l-2-3.46a1 1 0 0 1 .37-1.37l1.05-.6A5.83 5.83 0 0 1 4.5 12c0-.28.02-.56.06-.84l-1.05-.6a1 1 0 0 1-.37-1.37l2-3.46a1 1 0 0 1 1.37-.37l1.05.6c.44-.33.92-.6 1.44-.8V4a1 1 0 0 1 1-1Zm2 5a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z" fill="currentColor"/>
                            </svg>
                        </span>
                        <span>Painel</span>
                    </a>

                    <a class="cta-aluno" sec:authorize="hasRole('ALUNO')" th:href="@{/aluno/dashboard}" href="/aluno/dashboard">
                        <span class="cta-aluno-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" focusable="false">
                                <path d="M10 3h4a1 1 0 0 1 1 1v1.2c.52.2 1 .47 1.44.8l1.05-.6a1 1 0 0 1 1.37.37l2 3.46a1 1 0 0 1-.37 1.37l-1.05.6c.04.28.06.56.06.84s-.02.56-.06.84l1.05.6a1 1 0 0 1 .37 1.37l-2 3.46a1 1 0 0 1-1.37.37l-1.05-.6c-.44.33-.92.6-1.44.8V20a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1v-1.2a6.9 6.9 0 0 1-1.44-.8l-1.05.6a1 1 0 0 1-1.37-.37l-2-3.46a1 1 0 0 1 .37-1.37l1.05-.6A5.83 5.83 0 0 1 4.5 12c0-.28.02-.56.06-.84l-1.05-.6a1 1 0 0 1-.37-1.37l2-3.46a1 1 0 0 1 1.37-.37l1.05.6c.44-.33.92-.6 1.44-.8V4a1 1 0 0 1 1-1Zm2 5a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z" fill="currentColor"/>
                            </svg>
                        </span>
                        <span>Painel</span>
                    </a>

                    <form class="cta-logout-form" sec:authorize="isAuthenticated()" th:action="@{/logout}" action="/logout" method="post">
                        <button type="submit" class="cta-logout-btn">Sair</button>
                    </form>
                </div>
            </div>
        </header>

        <main class="site-main" th:replace="${content}">
            <section>
                <h1>Conteúdo da página</h1>
            </section>
        </main>

        <footer class="site-footer" id="contato">
            <div class="footer-container">
                <div class="footer-block">
                    <h3>Endereço</h3>
                    <p>Rua Exemplo, 123 - Centro - Sua Cidade/UF</p>
                </div>

                <div class="footer-block">
                    <h3>Atendimento</h3>
                    <a class="footer-link" href="https://wa.me/5511999999999?text=Ol%C3%A1%2C%20quero%20saber%20mais%20sobre%20a%20Step%20By%20Step!" target="_blank" rel="noopener noreferrer">
                        Falar no WhatsApp
                    </a>
                </div>

                <div class="footer-block">
                    <h3>Redes Sociais</h3>
                    <div class="social-links">
                        <a href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer">Instagram</a>
                        <a href="https://www.linkedin.com/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
                    </div>
                </div>
            </div>

            <p class="footer-copy">Desenvolvido por Seu Nome</p>
        </footer>
    </div>

    <script th:src="@{/js/layout.js}" src="/js/layout.js"></script>
</body>
</html>
