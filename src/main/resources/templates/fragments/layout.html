<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Step By Step'">Step By Step</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/blog.css}">
    <link rel="stylesheet" th:href="@{/css/blog-post.css}">
    <link rel="stylesheet" th:href="@{/css/galeria.css}">
    <link rel="stylesheet" th:href="@{/css/livros.css}">
    <link rel="stylesheet" th:href="@{/css/contato.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">

</head>
<body>
    <div class="site-shell">
        <header class="site-header" id="topo">
            <div class="header-container">
                <a class="brand" th:href="@{/}" href="/" aria-label="Ir para o topo">
                    <img th:src="@{/img/logo-transparente.png}" src="/img/logo-transparente.png" alt="Step By Step">
                </a>

                <button class="menu-toggle" type="button" aria-label="Abrir menu" aria-expanded="false" data-menu-toggle>
                    <span></span>
                    <span></span>
                    <span></span>
                </button>

                <nav class="site-nav" data-menu>
                    <a th:href="@{/}" href="/">Home</a>
                    <a th:href="@{/escola}" href="/escola">A Escola</a>
                    <a th:href="@{/blog}" href="/blog">Blog da Teacher</a>
                    <a th:href="@{/galeria}" href="/galeria">Galeria</a>
                    <a th:href="@{/livros}" href="/livros">Livros</a>
                    <a th:href="@{/contato}" href="/contato">Contato</a>
                </nav>

                <div class="header-actions">
                    <a class="cta-aluno" sec:authorize="isAnonymous()" th:href="@{/login}" href="/login">
                        <span class="cta-aluno-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" focusable="false">
                                <path d="M12 12.5a4.25 4.25 0 1 0 0-8.5 4.25 4.25 0 0 0 0 8.5Zm0 2.25c-4.1 0-7.5 2.68-8.34 6.25a.75.75 0 0 0 .73.92h15.22a.75.75 0 0 0 .73-.92c-.84-3.57-4.24-6.25-8.34-6.25Z" fill="currentColor"/>
                            </svg>
                        </span>
                        <span>Área do Aluno</span>
                    </a>

                    <a class="cta-aluno" sec:authorize="hasRole('ADMIN')" th:href="@{/admin/dashboard}" href="/admin/dashboard">
                        <span class="cta-aluno-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" focusable="false">
                                <path d="M10 3h4a1 1 0 0 1 1 1v1.2c.52.2 1 .47 1.44.8l1.05-.6a1 1 0 0 1 1.37.37l2 3.46a1 1 0 0 1-.37 1.37l-1.05.6c.04.28.06.56.06.84s-.02.56-.06.84l1.05.6a1 1 0 0 1 .37 1.37l-2 3.46a1 1 0 0 1-1.37.37l-1.05-.6c-.44.33-.92.6-1.44.8V20a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1v-1.2a6.9 6.9 0 0 1-1.44-.8l-1.05.6a1 1 0 0 1-1.37-.37l-2-3.46a1 1 0 0 1 .37-1.37l1.05-.6A5.83 5.83 0 0 1 4.5 12c0-.28.02-.56.06-.84l-1.05-.6a1 1 0 0 1-.37-1.37l2-3.46a1 1 0 0 1 1.37-.37l1.05.6c.44-.33.92-.6 1.44-.8V4a1 1 0 0 1 1-1Zm2 5a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z" fill="currentColor"/>
                            </svg>
                        </span>
                        <span>Painel</span>
                    </a>

                    <a class="cta-aluno" sec:authorize="hasRole('ALUNO')" th:href="@{/aluno/dashboard}" href="/aluno/dashboard">
                        <span class="cta-aluno-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" focusable="false">
                                <path d="M10 3h4a1 1 0 0 1 1 1v1.2c.52.2 1 .47 1.44.8l1.05-.6a1 1 0 0 1 1.37.37l2 3.46a1 1 0 0 1-.37 1.37l-1.05.6c.04.28.06.56.06.84s-.02.56-.06.84l1.05.6a1 1 0 0 1 .37 1.37l-2 3.46a1 1 0 0 1-1.37.37l-1.05-.6c-.44.33-.92.6-1.44.8V20a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1v-1.2a6.9 6.9 0 0 1-1.44-.8l-1.05.6a1 1 0 0 1-1.37-.37l-2-3.46a1 1 0 0 1 .37-1.37l1.05-.6A5.83 5.83 0 0 1 4.5 12c0-.28.02-.56.06-.84l-1.05-.6a1 1 0 0 1-.37-1.37l2-3.46a1 1 0 0 1 1.37-.37l1.05.6c.44-.33.92-.6 1.44-.8V4a1 1 0 0 1 1-1Zm2 5a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z" fill="currentColor"/>
                            </svg>
                        </span>
                        <span>Painel</span>
                    </a>

                    <form class="cta-logout-form" sec:authorize="isAuthenticated()" th:action="@{/logout}" action="/logout" method="post">
                        <button type="submit" class="cta-logout-btn">Sair</button>
                    </form>
                </div>
            </div>
        </header>

        <main class="site-main" th:replace="${content}">
            <section>
                <h1>Conteúdo da página</h1>
            </section>
        </main>

        <footer class="site-footer" id="contato">
            <div class="footer-container">
                <div class="footer-block">
                    <h3>Endereço</h3>
                    <p class="footer-address-line">
                        <span class="footer-address-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" focusable="false">
                                <path d="M12 2.8a7.2 7.2 0 0 0-7.2 7.2c0 5.38 6.16 10.6 6.42 10.82a1.2 1.2 0 0 0 1.6 0c.26-.22 6.42-5.44 6.42-10.82A7.2 7.2 0 0 0 12 2.8Zm0 9.9a2.7 2.7 0 1 1 0-5.4 2.7 2.7 0 0 1 0 5.4Z" fill="currentColor"/>
                            </svg>
                        </span>
                        <span>Rua Exemplo, 123 - Centro - Sua Cidade/UF</span>
                    </p>
                </div>

                <div class="footer-block">
                    <h3>Atendimento</h3>
                    <a class="footer-link footer-link-with-icon" href="https://wa.me/5511999999999?text=Ol%C3%A1%2C%20quero%20saber%20mais%20sobre%20a%20Step%20By%20Step!" target="_blank" rel="noopener noreferrer">
                        <span class="footer-link-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" focusable="false">
                                <path d="M20.52 3.48A11.86 11.86 0 0 0 12.08 0C5.56 0 .27 5.28.27 11.8c0 2.08.54 4.1 1.58 5.88L0 24l6.5-1.7a11.83 11.83 0 0 0 5.58 1.42h.01c6.52 0 11.81-5.28 11.81-11.8 0-3.15-1.23-6.1-3.38-8.44Zm-8.44 18.23h-.01a9.86 9.86 0 0 1-5.02-1.37l-.36-.21-3.86 1.01 1.03-3.76-.24-.39a9.8 9.8 0 0 1-1.5-5.2C2.12 6.55 6.37 2.3 11.61 2.3c2.54 0 4.92.99 6.71 2.79a9.43 9.43 0 0 1 2.78 6.71c0 5.23-4.25 9.48-9.48 9.48Zm5.2-7.1c-.29-.14-1.7-.84-1.96-.94-.26-.1-.45-.14-.64.15-.19.29-.73.94-.9 1.13-.16.19-.33.22-.62.07-.29-.14-1.2-.44-2.3-1.4-.85-.75-1.43-1.68-1.6-1.97-.17-.29-.02-.45.13-.59.13-.13.29-.33.43-.5.14-.16.19-.29.29-.49.09-.19.05-.36-.02-.5-.07-.14-.64-1.54-.88-2.12-.23-.54-.47-.47-.64-.48l-.55-.01c-.19 0-.5.07-.76.36-.26.29-1 1-1 2.43s1.03 2.82 1.17 3.01c.14.19 2.02 3.08 4.89 4.32.68.29 1.2.46 1.61.58.68.22 1.3.19 1.79.12.55-.08 1.7-.7 1.94-1.38.24-.68.24-1.26.17-1.38-.07-.11-.26-.18-.55-.33Z" fill="currentColor"/>
                            </svg>
                        </span>
                        <span>Falar no WhatsApp</span>
                    </a>
                </div>

                <div class="footer-block">
                    <h3>Redes Sociais</h3>
                    <div class="social-links">
                        <a class="footer-social-link" href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer">
                            <span class="footer-social-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" focusable="false">
                                    <path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2Zm0 1.9A3.85 3.85 0 0 0 3.9 7.75v8.5a3.85 3.85 0 0 0 3.85 3.85h8.5a3.85 3.85 0 0 0 3.85-3.85v-8.5a3.85 3.85 0 0 0-3.85-3.85h-8.5Zm8.95 1.45a1.15 1.15 0 1 1 0 2.3 1.15 1.15 0 0 1 0-2.3ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 1.9a3.1 3.1 0 1 0 0 6.2 3.1 3.1 0 0 0 0-6.2Z" fill="currentColor"/>
                                </svg>
                            </span>
                            <span>Instagram</span>
                        </a>
                        <a class="footer-social-link" href="https://www.facebook.com/" target="_blank" rel="noopener noreferrer">
                            <span class="footer-social-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" focusable="false">
                                    <path d="M13.3 21v-8.03h2.7l.4-3.13h-3.1V7.84c0-.9.25-1.52 1.53-1.52H16.5V3.5a22.9 22.9 0 0 0-2.47-.13c-2.44 0-4.1 1.48-4.1 4.2v2.27H7.2v3.13h2.73V21h3.37Z" fill="currentColor"/>
                                </svg>
                            </span>
                            <span>Facebook</span>
                        </a>
                    </div>
                </div>
            </div>

            <p class="footer-copy">&copy; <span id="year"></span> Step By Step - Desenvolvido por <a class="footer-link" href="https://www.andreyferraz.com.br" target="_blank" rel="noopener noreferrer">Andrêy Ferraz</a></p>
        </footer>
    </div>

    <script th:src="@{/js/layout.js}" src="/js/layout.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
