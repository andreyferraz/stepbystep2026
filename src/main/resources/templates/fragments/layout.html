<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Step By Step'">Step By Step</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
</head>
<body>
    <div class="site-shell">
        <header class="site-header" id="topo">
            <div class="header-container">
                <a class="brand" href="#topo" aria-label="Ir para o topo">
                    <img th:src="@{/img/logo.png}" src="/img/logo.png" alt="Step By Step">
                </a>

                <button class="menu-toggle" type="button" aria-label="Abrir menu" aria-expanded="false" data-menu-toggle>
                    <span></span>
                    <span></span>
                    <span></span>
                </button>

                <nav class="site-nav" data-menu>
                    <a href="#topo">Home</a>
                    <a href="#escola">A Escola</a>
                    <a href="#blog">Blog da Teacher</a>
                    <a href="#galeria">Galeria</a>
                    <a href="#livros">Livros</a>
                    <a href="#contato">Contato</a>
                </nav>

                <a class="cta-aluno" th:href="@{/login}" href="/login">Área do Aluno</a>
            </div>
        </header>

        <main class="site-main" th:replace="${content}">
            <section>
                <h1>Conteúdo da página</h1>
            </section>
        </main>

        <footer class="site-footer" id="contato">
            <div class="footer-container">
                <div class="footer-block">
                    <h3>Endereço</h3>
                    <p>Rua Exemplo, 123 - Centro - Sua Cidade/UF</p>
                </div>

                <div class="footer-block">
                    <h3>Atendimento</h3>
                    <a class="footer-link" href="https://wa.me/5511999999999?text=Ol%C3%A1%2C%20quero%20saber%20mais%20sobre%20a%20Step%20By%20Step!" target="_blank" rel="noopener noreferrer">
                        Falar no WhatsApp
                    </a>
                </div>

                <div class="footer-block">
                    <h3>Redes Sociais</h3>
                    <div class="social-links">
                        <a href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer">Instagram</a>
                        <a href="https://www.linkedin.com/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
                    </div>
                </div>
            </div>

            <p class="footer-copy">Desenvolvido por Seu Nome</p>
        </footer>
    </div>

    <script th:src="@{/js/layout.js}" src="/js/layout.js"></script>
</body>
</html>
