<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::main})}">
<head>
    <title>Galeria - Step By Step</title>
</head>
<main>
    <section class="inner-hero gallery-hero">
        <div class="inner-hero-copy">
            <p class="section-kicker">Galeria</p>
            <h1>Nossos Momentos</h1>
            <p>
                Confira os registros das nossas aulas, eventos, formaturas e lançamentos
                que fazem parte da trajetória da Step By Step.
            </p>
        </div>

        <figure class="inner-hero-media">
            <img th:src="@{/img/banner.webp}" src="/img/banner.webp"
                 alt="Momentos especiais da escola e dos alunos">
        </figure>
    </section>

    <section class="gallery-section">
        <div class="gallery-toolbar">
            <div class="gallery-toolbar-copy">
                <p class="section-kicker">Vivendo o Inglês</p>
                <h2>Registros que contam a nossa história</h2>
                <p>
                    Explore fotos de aulas, celebrações e momentos marcantes da escola.
                </p>
            </div>

            <div class="gallery-filters" aria-label="Filtros da galeria">
                <button type="button" class="gallery-filter-btn is-active" data-gallery-filter="all">Todos</button>
                <button type="button"
                    class="gallery-filter-btn"
                    th:each="categoria : ${galeriaCategorias}"
                    th:attr="data-gallery-filter=${categoria.chave}"
                    th:text="${categoria.nome}">
                    Categoria
                </button>
            </div>
        </div>

        <div class="gallery-masonry" data-gallery-grid aria-label="Galeria de fotos">
            <figure class="gallery-item"
                    th:each="foto, iter : ${galeriaFotos}"
                    th:classappend="${iter.index % 4 == 0 ? ' is-tall' : (iter.index % 3 == 0 ? ' is-wide' : '')}"
                    data-gallery-item
                    th:attr="
                        data-category=${foto.categoriaChave},
                        data-title=${#strings.isEmpty(foto.legenda) ? 'Registro da escola' : foto.legenda},
                        data-image=${!#strings.isEmpty(foto.urlImagem) ? foto.urlImagem : '/img/banner.webp'}">
                <button type="button" class="gallery-card" data-gallery-open>
                    <img th:src="${!#strings.isEmpty(foto.urlImagem) ? foto.urlImagem : '/img/banner.webp'}" src="/img/banner.webp"
                         th:alt="${#strings.isEmpty(foto.legenda) ? 'Foto da galeria da escola' : foto.legenda}"
                         alt="Foto da galeria"
                         loading="lazy">
                    <figcaption>
                        <span class="gallery-item-category"
                            th:text="${foto.categoriaNome}">
                            Categoria
                        </span>
                        <strong th:text="${#strings.isEmpty(foto.legenda) ? 'Registro da escola' : foto.legenda}">Registro da escola</strong>
                    </figcaption>
                </button>
            </figure>

            <figure class="gallery-item" data-gallery-item data-category="all" data-title="Galeria em atualização" data-image="/img/banner.webp" th:if="${galeriaFotos == null or #lists.isEmpty(galeriaFotos)}">
                <button type="button" class="gallery-card" data-gallery-open>
                    <img th:src="@{/img/banner.webp}" src="/img/banner.webp"
                         alt="Galeria em atualização"
                         loading="lazy">
                    <figcaption>
                        <span class="gallery-item-category">Galeria</span>
                        <strong>Em breve: novos registros da escola</strong>
                    </figcaption>
                </button>
            </figure>
        </div>
    </section>

    <div class="gallery-lightbox" data-gallery-lightbox hidden aria-hidden="true">
        <div class="gallery-lightbox-backdrop" data-gallery-close></div>

        <dialog class="gallery-lightbox-dialog" aria-label="Visualizador de imagem" open>
            <button type="button" class="gallery-lightbox-close" data-gallery-close aria-label="Fechar visualizador">
                &times;
            </button>

            <button type="button" class="gallery-lightbox-nav prev" data-gallery-prev aria-label="Imagem anterior">
                &#10094;
            </button>

            <figure class="gallery-lightbox-figure">
                <img src="/img/banner.webp" alt="" data-gallery-lightbox-image>
                <figcaption data-gallery-lightbox-caption>Legenda da imagem</figcaption>
            </figure>

            <button type="button" class="gallery-lightbox-nav next" data-gallery-next aria-label="Próxima imagem">
                &#10095;
            </button>
        </dialog>
    </div>
</main>
</html>
