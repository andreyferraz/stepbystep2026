<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::main})}">
<head>
    <title>Galeria - Step By Step</title>
</head>
<main>
    <section class="inner-hero gallery-hero">
        <div class="inner-hero-copy">
            <p class="section-kicker">Galeria</p>
            <h1>Nossos Momentos</h1>
            <p>
                Confira os registros das nossas aulas, eventos, formaturas e lançamentos
                que fazem parte da trajetória da Step By Step.
            </p>
        </div>

        <figure class="inner-hero-media">
            <img th:src="@{/img/banner.png}" src="/img/banner.png"
                 alt="Momentos especiais da escola e dos alunos">
        </figure>
    </section>

    <section class="gallery-section">
        <div class="gallery-toolbar">
            <div class="gallery-toolbar-copy">
                <p class="section-kicker">Vivendo o Inglês</p>
                <h2>Registros que contam a nossa história</h2>
                <p>
                    Explore fotos de aulas, celebrações e momentos marcantes da escola.
                </p>
            </div>

            <div class="gallery-filters" aria-label="Filtros da galeria">
                <button type="button" class="gallery-filter-btn is-active" data-gallery-filter="all">Todos</button>
                <button type="button" class="gallery-filter-btn" data-gallery-filter="aulas">Aulas</button>
                <button type="button" class="gallery-filter-btn" data-gallery-filter="eventos">Eventos e Formaturas</button>
                <button type="button" class="gallery-filter-btn" data-gallery-filter="livros">Lançamentos de Livros</button>
            </div>
        </div>

        <div class="gallery-masonry" data-gallery-grid aria-label="Galeria de fotos">
            <figure class="gallery-item is-tall" data-gallery-item data-category="aulas"
                    data-title="Turma do Intermediário - 2025"
                    data-image="/img/banner.png">
                <button type="button" class="gallery-card" data-gallery-open>
                    <img th:src="@{/img/banner.png}" src="/img/banner.png"
                         alt="Turma do Intermediário em atividade"
                         loading="lazy">
                    <figcaption>
                        <span class="gallery-item-category">Aulas</span>
                        <strong>Turma do Intermediário - 2025</strong>
                    </figcaption>
                </button>
            </figure>

            <figure class="gallery-item" data-gallery-item data-category="eventos"
                    data-title="Celebrando a formatura da turma avançada"
                    data-image="/img/banner.png">
                <button type="button" class="gallery-card" data-gallery-open>
                    <img th:src="@{/img/banner.png}" src="/img/banner.png"
                         alt="Formatura da turma avançada"
                         loading="lazy">
                    <figcaption>
                        <span class="gallery-item-category">Eventos e Formaturas</span>
                        <strong>Celebrando a formatura da turma avançada</strong>
                    </figcaption>
                </button>
            </figure>

            <figure class="gallery-item is-wide" data-gallery-item data-category="livros"
                    data-title="Lançamento de livro com sessão de autógrafos"
                    data-image="/img/banner.png">
                <button type="button" class="gallery-card" data-gallery-open>
                    <img th:src="@{/img/banner.png}" src="/img/banner.png"
                         alt="Lançamento de livro com sessão de autógrafos"
                         loading="lazy">
                    <figcaption>
                        <span class="gallery-item-category">Lançamentos de Livros</span>
                        <strong>Lançamento de livro com sessão de autógrafos</strong>
                    </figcaption>
                </button>
            </figure>

            <figure class="gallery-item" data-gallery-item data-category="aulas"
                    data-title="Momento de conversação em dupla"
                    data-image="/img/banner.png">
                <button type="button" class="gallery-card" data-gallery-open>
                    <img th:src="@{/img/banner.png}" src="/img/banner.png"
                         alt="Alunos praticando conversação"
                         loading="lazy">
                    <figcaption>
                        <span class="gallery-item-category">Aulas</span>
                        <strong>Momento de conversação em dupla</strong>
                    </figcaption>
                </button>
            </figure>

            <figure class="gallery-item is-tall" data-gallery-item data-category="eventos"
                    data-title="Encontro especial com alunos e familiares"
                    data-image="/img/banner.png">
                <button type="button" class="gallery-card" data-gallery-open>
                    <img th:src="@{/img/banner.png}" src="/img/banner.png"
                         alt="Encontro especial com alunos e familiares"
                         loading="lazy">
                    <figcaption>
                        <span class="gallery-item-category">Eventos e Formaturas</span>
                        <strong>Encontro especial com alunos e familiares</strong>
                    </figcaption>
                </button>
            </figure>

            <figure class="gallery-item" data-gallery-item data-category="livros"
                    data-title="Mesa de lançamento e leitura"
                    data-image="/img/banner.png">
                <button type="button" class="gallery-card" data-gallery-open>
                    <img th:src="@{/img/banner.png}" src="/img/banner.png"
                         alt="Mesa com livros em exposição"
                         loading="lazy">
                    <figcaption>
                        <span class="gallery-item-category">Lançamentos de Livros</span>
                        <strong>Mesa de lançamento e leitura</strong>
                    </figcaption>
                </button>
            </figure>

            <figure class="gallery-item is-wide" data-gallery-item data-category="aulas"
                    data-title="Atividade coletiva em sala"
                    data-image="/img/banner.png">
                <button type="button" class="gallery-card" data-gallery-open>
                    <img th:src="@{/img/banner.png}" src="/img/banner.png"
                         alt="Atividade coletiva em sala de aula"
                         loading="lazy">
                    <figcaption>
                        <span class="gallery-item-category">Aulas</span>
                        <strong>Atividade coletiva em sala</strong>
                    </figcaption>
                </button>
            </figure>

            <figure class="gallery-item" data-gallery-item data-category="eventos"
                    data-title="Encerramento com entrega de certificados"
                    data-image="/img/banner.png">
                <button type="button" class="gallery-card" data-gallery-open>
                    <img th:src="@{/img/banner.png}" src="/img/banner.png"
                         alt="Entrega de certificados aos alunos"
                         loading="lazy">
                    <figcaption>
                        <span class="gallery-item-category">Eventos e Formaturas</span>
                        <strong>Encerramento com entrega de certificados</strong>
                    </figcaption>
                </button>
            </figure>

            <figure class="gallery-item" data-gallery-item data-category="livros"
                    data-title="Leitura e conversa com os participantes"
                    data-image="/img/banner.png">
                <button type="button" class="gallery-card" data-gallery-open>
                    <img th:src="@{/img/banner.png}" src="/img/banner.png"
                         alt="Momento de leitura e conversa"
                         loading="lazy">
                    <figcaption>
                        <span class="gallery-item-category">Lançamentos de Livros</span>
                        <strong>Leitura e conversa com os participantes</strong>
                    </figcaption>
                </button>
            </figure>
        </div>
    </section>

    <div class="gallery-lightbox" data-gallery-lightbox hidden aria-hidden="true">
        <div class="gallery-lightbox-backdrop" data-gallery-close></div>

        <div class="gallery-lightbox-dialog" role="dialog" aria-modal="true" aria-label="Visualizador de imagem">
            <button type="button" class="gallery-lightbox-close" data-gallery-close aria-label="Fechar visualizador">
                &times;
            </button>

            <button type="button" class="gallery-lightbox-nav prev" data-gallery-prev aria-label="Imagem anterior">
                &#10094;
            </button>

            <figure class="gallery-lightbox-figure">
                <img src="/img/banner.png" alt="" data-gallery-lightbox-image>
                <figcaption data-gallery-lightbox-caption>Legenda da imagem</figcaption>
            </figure>

            <button type="button" class="gallery-lightbox-nav next" data-gallery-next aria-label="Próxima imagem">
                &#10095;
            </button>
        </div>
    </div>
</main>
</html>
