<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::main})}">

<head>
    <title>Acesso Negado - Step By Step</title>
</head>
<main>
    <section class="contact-faq-section">
        <div class="contact-faq-header">
            <p class="section-kicker">Erro 403</p>
            <h1>Acesso negado</h1>
            <p>
                Você não tem permissão para acessar esta área.
                Faça login com um perfil autorizado para continuar.
            </p>
        </div>

        <div class="contact-faq-list">
            <a class="hero-btn hero-btn-primary" th:href="@{/login}" href="/login">Ir para login</a>
            <a class="hero-btn hero-btn-secondary" th:href="@{/}" href="/">Voltar para home</a>
        </div>
    </section>
</main>

</html>
