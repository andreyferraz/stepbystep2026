name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - "feature/**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SPRING_MAIL_USERNAME: ${{ secrets.SPRING_MAIL_USERNAME }}
      SPRING_MAIL_PASSWORD: ${{ secrets.SPRING_MAIL_PASSWORD }}
      PREINSCRICAO_EMAIL_DESTINATARIO: ${{ secrets.PREINSCRICAO_EMAIL_DESTINATARIO }}
      PREINSCRICAO_EMAIL_REMETENTE: ${{ secrets.PREINSCRICAO_EMAIL_REMETENTE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Validate required secrets (main only)
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          missing=0

          if [[ -z "${SPRING_MAIL_USERNAME:-}" ]]; then
            echo "SPRING_MAIL_USERNAME is missing"
            missing=1
          fi

          if [[ -z "${SPRING_MAIL_PASSWORD:-}" ]]; then
            echo "SPRING_MAIL_PASSWORD is missing"
            missing=1
          fi

          if [[ -z "${PREINSCRICAO_EMAIL_DESTINATARIO:-}" ]]; then
            echo "PREINSCRICAO_EMAIL_DESTINATARIO is missing"
            missing=1
          fi

          if [[ "$missing" -ne 0 ]]; then
            echo "Configure these in GitHub: Settings > Secrets and variables > Actions"
            exit 1
          fi

      - name: Build
        run: ./mvnw -B -DskipTests compile
